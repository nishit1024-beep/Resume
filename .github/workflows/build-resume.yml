name: Build Resume PDF

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra

      - name: Compile resume
        run: |
          pdflatex -interaction=nonstopmode NPCV_ST/resume.tex
          pdflatex -interaction=nonstopmode NPCV_ST/resume.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nishit_Panchal_Resume
          path: NPCV_ST/resume.pdf
          retention-days: 30

      - name: Commit PDF back to repo (optional)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NPCV_ST/resume.pdf
          git diff --staged --quiet || git commit -m "ci: rebuild resume PDF [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
