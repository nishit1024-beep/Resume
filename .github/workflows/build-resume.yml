name: Build Resume PDF

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          work_in_root_file_dir: true
          working_directory: NPCV_ST
          latexmk_use_xelatex: false
          latexmk_use_lualatex: false

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nishit_Panchal_Resume
          path: NPCV_ST/resume.pdf
          retention-days: 30

      - name: Commit PDF back to repo
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add NPCV_ST/resume.pdf
          git diff --staged --quiet || git commit -m "ci: auto-compile resume.pdf [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
